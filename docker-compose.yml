services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://api:8000}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "/app/scripts/with_prewarm.sh", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - api-data:/app/data
      - paddlex-cache:/root/.paddlex
      - paddle-cache:/root/.cache/paddle
    environment:
      MAX_FILE_MB: ${MAX_FILE_MB:-100}
      MAX_PAGES: ${MAX_PAGES:-200}
      JOB_TTL_MINUTES: ${JOB_TTL_MINUTES:-60}
      JOB_KEEPALIVE_INTERVAL_S: ${JOB_KEEPALIVE_INTERVAL_S:-15}
      JOB_ROOT_DIR: ${JOB_ROOT_DIR:-/app/data/jobs}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_BASE_URL: ${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-Pro/deepseek-ai/deepseek-ocr}
      OCR_PADDLE_LAYOUT_PREWARM: ${OCR_PADDLE_LAYOUT_PREWARM:-1}
      OCR_PADDLE_LAYOUT_PREWARM_TARGET: ${OCR_PADDLE_LAYOUT_PREWARM_TARGET:-worker}
      OCR_PADDLE_VL_PREWARM: ${OCR_PADDLE_VL_PREWARM:-0}
      OCR_PADDLE_VL_PREWARM_TARGET: ${OCR_PADDLE_VL_PREWARM_TARGET:-worker}
      OCR_PADDLE_VL_DOCPARSER_USE_QUEUES: ${OCR_PADDLE_VL_DOCPARSER_USE_QUEUES:-}
      OCR_PADDLE_VL_DOCPARSER_MAX_SIDE_PX: ${OCR_PADDLE_VL_DOCPARSER_MAX_SIDE_PX:-}
      APP_SERVICE_ROLE: api
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    networks:
      - app-network

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "/app/scripts/with_prewarm.sh", "sh", "-c", "workers=$${WORKER_CONCURRENCY:-1}; i=1; while [ $$i -le $$workers ]; do python -m app.worker & i=$$((i+1)); done; wait"]
    volumes:
      - api-data:/app/data
      - paddlex-cache:/root/.paddlex
      - paddle-cache:/root/.cache/paddle
    environment:
      MAX_FILE_MB: ${MAX_FILE_MB:-100}
      MAX_PAGES: ${MAX_PAGES:-200}
      JOB_TTL_MINUTES: ${JOB_TTL_MINUTES:-60}
      JOB_KEEPALIVE_INTERVAL_S: ${JOB_KEEPALIVE_INTERVAL_S:-15}
      JOB_ROOT_DIR: ${JOB_ROOT_DIR:-/app/data/jobs}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_BASE_URL: ${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-Pro/deepseek-ai/deepseek-ocr}
      OCR_PADDLE_LAYOUT_PREWARM: ${OCR_PADDLE_LAYOUT_PREWARM:-1}
      OCR_PADDLE_LAYOUT_PREWARM_TARGET: ${OCR_PADDLE_LAYOUT_PREWARM_TARGET:-worker}
      OCR_PADDLE_VL_PREWARM: ${OCR_PADDLE_VL_PREWARM:-0}
      OCR_PADDLE_VL_PREWARM_TARGET: ${OCR_PADDLE_VL_PREWARM_TARGET:-worker}
      OCR_PADDLE_VL_DOCPARSER_USE_QUEUES: ${OCR_PADDLE_VL_DOCPARSER_USE_QUEUES:-}
      OCR_PADDLE_VL_DOCPARSER_MAX_SIDE_PX: ${OCR_PADDLE_VL_DOCPARSER_MAX_SIDE_PX:-}
      APP_SERVICE_ROLE: worker
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  api-data:
  paddlex-cache:
  paddle-cache:
