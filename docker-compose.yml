services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_API_PORT=${NEXT_PUBLIC_API_PORT:-8000}
    depends_on:
      - api
    networks:
      - app-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      - MAX_FILE_MB=${MAX_FILE_MB:-100}
      - MAX_PAGES=${MAX_PAGES:-200}
      - JOB_TTL_MINUTES=${JOB_TTL_MINUTES:-60}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - CORS_ALLOW_ORIGIN_REGEX=${CORS_ALLOW_ORIGIN_REGEX:-}
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: python -m app.worker
    volumes:
      - ./api:/app
    environment:
      - MAX_FILE_MB=${MAX_FILE_MB:-100}
      - MAX_PAGES=${MAX_PAGES:-200}
      - JOB_TTL_MINUTES=${JOB_TTL_MINUTES:-60}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Disable persistence - no AOF, no RDB snapshots
    command: redis-server --save "" --appendonly no
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
