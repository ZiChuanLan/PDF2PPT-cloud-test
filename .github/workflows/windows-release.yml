name: windows-release-bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

jobs:
  build-windows-bundle:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build launcher and release bundle
        shell: pwsh
        run: |
          ./packaging/windows/build_exe.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppt-opencode-win-x64
          path: release/windows/ppt-opencode-win-x64.zip

      - name: Upload launcher exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPT-OpenCode-Launcher-exe
          path: release/windows/PPT-OpenCode-Launcher.exe

      - name: Attach zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows/ppt-opencode-win-x64.zip
            release/windows/PPT-OpenCode-Launcher.exe
